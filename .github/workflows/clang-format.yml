name: Clang Format

on: [push, pull_request]

jobs:
  clang-format:
    runs-on: ubuntu-latest

    permissions: write-all

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Which Clang-Format
        run: |
          which clang-format
          clang-format --version

      - name: Auto-format
        run: find . -name '*.c' -o -name '*.h' | xargs clang-format -i -style=file

      - name: Commit changes
        run: |
          if [[ -n $(git status --porcelain) ]]; then
            git config user.name "github-actions"
            git config user.email "github-actions@github.com"
            git add .
            git commit -m "Auto format with clang-format"
            git push
          fi

      - name: Run clang-format check
        run: |
          echo "Checking C code style..."
          failed=0
          files=$(find . -name '*.c' -o -name '*.h')
          for f in $files; do
            diff_output=$(diff -u "$f" <(clang-format -style=file "$f") || true)
            if [ -n "$diff_output" ]; then
              echo "Style issues in $f:"
              echo "$diff_output"
              failed=1
            fi
          done
          if [ $failed -eq 1 ]; then
            echo "Some files do not match the style. Fix with clang-format."
            exit 1
          else
            echo "Style check passed"
          fi